<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#F3293B" stop-opacity="0.2"/>
      <stop offset="80%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#bg)"/>
  <ellipse cx="300" cy="170" rx="180" ry="140" fill="url(#glow)"/>
  <!-- Chat bubbles abstract -->
  <g opacity="0.5">
    <rect x="160" y="80" width="180" height="40" rx="20" fill="#1a1a2a" stroke="#F3293B" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="260" y="140" width="200" height="40" rx="20" fill="#1a1a2a" stroke="#F3293B" stroke-opacity="0.3" stroke-width="1"/>
    <rect x="180" y="200" width="160" height="40" rx="20" fill="#1a1a2a" stroke="#F3293B" stroke-opacity="0.3" stroke-width="1"/>
    <!-- dots inside bubbles -->
    <circle cx="210" cy="100" r="3" fill="#F3293B" opacity="0.6"/>
    <circle cx="225" cy="100" r="3" fill="#F3293B" opacity="0.4"/>
    <circle cx="240" cy="100" r="3" fill="#F3293B" opacity="0.2"/>
    <circle cx="310" cy="160" r="3" fill="#F3293B" opacity="0.6"/>
    <circle cx="325" cy="160" r="3" fill="#F3293B" opacity="0.4"/>
    <circle cx="340" cy="160" r="3" fill="#F3293B" opacity="0.2"/>
  </g>
  <!-- Brain/AI icon -->
  <circle cx="400" cy="100" r="25" fill="none" stroke="#F3293B" stroke-width="1.5" opacity="0.4"/>
  <circle cx="400" cy="100" r="12" fill="#F3293B" opacity="0.15"/>
  <circle cx="400" cy="100" r="4" fill="#F3293B" opacity="0.6"/>
  <text x="300" y="175" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="2">MyBrandPersona</text>
  <text x="300" y="198" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="300" fill="#F3293B" letter-spacing="4">GPT</text>
  <text x="300" y="225" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="12" fill="#808080" letter-spacing="3">CONVERSACIONAL COM IA</text>
</svg>